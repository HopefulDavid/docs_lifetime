name: Documentation CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Dotnet Setup
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.x

      - name: Generate Changelog
        if: github.actor != 'github-actions[bot]'
        run: |
          rm -f changelog.md
          npm install -g conventional-changelog-cli
          conventional-changelog -i changelog.md -s --config ./changelog-config.js
          git add changelog.md
          if git diff --cached --quiet; then
            echo "Changelog is already up to date."
          else
            git commit -m "chore: update changelog"
            git push origin main
          fi

      - name: Read changelog.md content for email
        id: read_changelog_md
        run: |
          echo "changelog<<EOF" >> $GITHUB_ENV
          awk '
            NR == 1 && $0 == "---" { frontmatter = 1; next }
            frontmatter && $0 == "---" { frontmatter = 0; next }
            !frontmatter { print }
          ' changelog.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send email with changelog content
        uses: dawidd6/action-send-mail@v17
        continue-on-error: true
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: "dslavik29@outlook.com"
          subject: "Nové změny v dokumentaci"
          to: "dslavik29@outlook.com,lucie.slavikova33@outlook.com, rslavikova9@seznam.cz, d.pochova@seznam.cz, vslavik19@seznam.cz"
          convert_markdown: true
          html_body: |
            <p>Nové změny v dokumentaci jsou k dispozici. Podívejte se na ně <a href="https://hopefuldavid.github.io/docs_lifetime/">zde</a>.</p>
            <hr>
            ${{ env.changelog }}

      - name: Generate documentation navigation
        run: npm run docs:generate

      - run: dotnet tool update -g docfx
      - run: docfx docfx.json

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
